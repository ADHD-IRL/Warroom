kind = "web"
previewPath = "/"
title = "WARROOM"
version = "1.0.0"
id = "artifacts/warroom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19869

[services.development]
run = "pnpm --filter @workspace/warroom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/warroom", "run", "build" ]
publicDir = "artifacts/warroom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19869"
BASE_PATH = "/"
